<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Smart Start</title>

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: white;
    }

    /* Navbar */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 50px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
      position: sticky;
      top: 0;
    }

    .logo {
      font-size: 24px;
      font-weight: bold;
    }

    .logo i {
      color: #00f2ff;
      margin-right: 8px;
    }

    nav a {
      color: white;
      margin-left: 20px;
      text-decoration: none;
      transition: 0.3s;
    }

    nav a:hover {
      color: #00f2ff;
    }

    /* Hero Section */
    .hero {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 80px 50px;
    }

    .hero h1 {
      font-size: 40px;
      background: linear-gradient(90deg, #ff8a00, #e52e71);
      -webkit-background-clip: text;
      color: transparent;
    }

    .hero p {
      margin: 15px 0;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 25px;
      background: #00f2ff;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.1);
      background: #00c3cc;
    }

    /* Features */
    .features {
      display: flex;
      justify-content: space-around;
      padding: 50px;
    }

    .feature-box {
      width: 250px;
      padding: 20px;
      border-radius: 15px;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      text-align: center;
      transition: 0.3s;
    }

    .feature-box:hover {
      transform: translateY(-10px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }

    footer {
      text-align: center;
      padding: 20px;
      background: rgba(0,0,0,0.7);
      margin-top: 30px;
    }

    /* Responsive */
    @media(max-width:768px) {
      .hero {
        flex-direction: column;
        text-align: center;
      }

      .features {
        flex-direction: column;
        align-items: center;
        gap: 20px;
      }
    }

  </style>
</head>

<body>

  <!-- Navbar -->
  <header>
    <div class="logo">
      <i class="fas fa-rocket"></i> Smart Start
    </div>

    <nav>
      <a href="#">Home</a>
      <a href="#">About</a>
      <a href="#">Features</a>
      <a href="#">Contact</a>
    </nav>
  </header>

  <!-- Hero -->
  <section class="hero">
    <div>
      <h1>Build Your Future Today 🚀</h1>
      <p>Start learning and grow your skills with Smart Start.</p>
      <button>Get Started</button>
    </div>

    <img src="https://cdn-icons-png.flaticon.com/512/1055/1055687.png" width="250">
  </section>

  <!-- Features -->
  <section class="features">
    <div class="feature-box">
      <h3>🚀 Fast Learning</h3>
      <p>Learn quickly with simple content.</p>
    </div>

    <div class="feature-box">
      <h3>📱 Responsive</h3>
      <p>Works on all devices.</p>
    </div>

    <div class="feature-box">
      <h3>⚙ Easy Custom</h3>
      <p>Customize as you like.</p>
    </div>
  </section>

  <!-- Footer -->
  <footer>
    <p>© 2026 Smart Start</p>
  </footer>

</body>
</html>
